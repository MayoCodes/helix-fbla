<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helix Support</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #071818 0%, #0d2e2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 24px;
        }

        .card {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(20px);
        }

        .logo {
            width: 72px;
            height: 72px;
            background: rgba(73, 166, 166, 0.15);
            border: 1px solid rgba(73, 166, 166, 0.30);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 32px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: white;
        }

        .subtitle {
            font-size: 15px;
            color: rgba(255,255,255,0.45);
            margin-bottom: 36px;
            line-height: 1.5;
        }

        .divider {
            height: 1px;
            background: rgba(255,255,255,0.08);
            margin-bottom: 36px;
        }

        p {
            font-size: 15px;
            color: rgba(255,255,255,0.55);
            line-height: 1.7;
            margin-bottom: 28px;
        }

        a.email-btn {
            display: inline-block;
            background: #49a6a6;
            color: white;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            padding: 14px 32px;
            border-radius: 12px;
            transition: background 0.2s, transform 0.1s;
        }

        a.email-btn:hover {
            background: #3d8f8f;
            transform: translateY(-1px);
        }

        .footer {
            margin-top: 36px;
            font-size: 12px;
            color: rgba(255,255,255,0.20);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🐾</div>
        <h1>Helix Support</h1>
        <p class="subtitle">AR Pet Companion</p>
        <div class="divider"></div>
        <p>Having trouble with the app or have a question? We're happy to help. Reach out to us directly and we'll get back to you as soon as possible.</p>
        <a class="email-btn" href="mailto:helixfbla@gmail.com">helixfbla@gmail.com</a>
        <div class="footer">© 2026 Helix. All rights reserved.</div>
    </div>
</body>
</html>
