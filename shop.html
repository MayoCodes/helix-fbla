<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Accessories — 3D Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-white: #fafbf9; --bg-cream: #f3f1ec;
            --teal: #1a8a7d; --teal-light: #2ec4b6; --teal-dark: #147068; --teal-pale: #e0f5f2;
            --text-dark: #1e2a2a; --text-mid: #5a706e; --text-light: #8fa3a0;
            --coral: #f4845f;
            --font-mono: 'Space Mono', monospace;
            --font-display: 'Playfair Display', serif;
            --font-body: 'DM Sans', sans-serif;
        }
        html, body { overflow: hidden; height: 100%; background: var(--bg-white); color: var(--text-dark); font-family: var(--font-body); cursor: default; }

        .pattern-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.3;
            background-image: radial-gradient(circle at 20% 50%, var(--teal-pale) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(244,132,95,0.08) 0%, transparent 40%), radial-gradient(circle at 60% 80%, var(--teal-pale) 0%, transparent 45%); }
        .pattern-dots { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.12;
            background-image: radial-gradient(circle, var(--teal) 0.7px, transparent 0.7px); background-size: 30px 30px; }

        .scroll-container { position: fixed; top: 0; left: 0; right: 0; bottom: 52px; overflow: hidden; }
        .scroll-track { display: flex; height: 100%; will-change: transform; }

        .hero-section { flex-shrink: 0; width: 100vw; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; padding: 60px 80px; }
        .hero-meta { display: flex; justify-content: space-between; width: 100%; margin-bottom: 24px; }
        .hero-meta span { font-family: var(--font-mono); font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text-light); }
        .hero-eyebrow { font-family: var(--font-mono); font-size: 13px; letter-spacing: 4px; text-transform: uppercase; color: var(--teal); margin-bottom: 16px; opacity: 0; animation: fadeUp 0.8s 0.2s forwards; }
        .hero-title { font-family: var(--font-display); font-size: clamp(72px, 11vw, 160px); line-height: 0.9; text-align: center; letter-spacing: -2px; color: var(--text-dark); opacity: 0; animation: heroReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards; }
        .hero-title em { font-style: italic; color: var(--teal); }
        @keyframes heroReveal { 0% { opacity: 0; transform: translateY(50px) scale(0.96); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        .hero-subtitle { margin-top: 28px; font-family: var(--font-body); font-size: 16px; letter-spacing: 0.5px; color: var(--text-mid); line-height: 1.6; text-align: center; max-width: 440px; opacity: 0; animation: fadeUp 1s 0.8s forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .hero-paw { position: absolute; font-size: 120px; opacity: 0.04; color: var(--teal); pointer-events: none; }
        .hero-paw.p1 { top: 10%; left: 8%; transform: rotate(-25deg); }
        .hero-paw.p2 { bottom: 12%; right: 10%; transform: rotate(15deg); }
        .hero-paw.p3 { top: 40%; right: 5%; transform: rotate(-45deg); font-size: 80px; }

        .product-section { flex-shrink: 0; width: 100vw; height: 100%; display: grid; grid-template-columns: 1fr 1fr; position: relative; }
        .product-section::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 1px; height: 50%;
            background: repeating-linear-gradient(to bottom, var(--teal-light) 0px, var(--teal-light) 6px, transparent 6px, transparent 14px); opacity: 0.25; }

        .model-panel { position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden;
            background: linear-gradient(135deg, var(--bg-cream) 0%, var(--bg-white) 100%); }
        .model-panel canvas { width: 100% !important; height: 100% !important; outline: none; display: block; }
        .model-panel::after { content: ''; position: absolute; inset: 28px; border: 1.5px solid rgba(26,138,125,0.08); border-radius: 16px; pointer-events: none; }

        .info-panel { display: flex; flex-direction: column; justify-content: center; padding: 60px 80px; position: relative; background: var(--bg-white); }
        .product-tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--teal); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .product-tag::before { content: ''; width: 24px; height: 1.5px; background: var(--teal); display: inline-block; }
        .product-name { font-family: var(--font-display); font-size: clamp(34px, 3.5vw, 56px); letter-spacing: 0.5px; color: var(--text-dark); margin-bottom: 8px; line-height: 1.1; }
        .product-desc { font-family: var(--font-body); font-size: 15px; color: var(--text-light); margin-bottom: 20px; line-height: 1.5; }
        .product-price { font-family: var(--font-mono); font-size: 22px; color: var(--teal-dark); margin-bottom: 28px; font-weight: 700; }
        .quick-view-btn { display: inline-block; width: fit-content; font-family: var(--font-mono); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #fff; background: var(--teal); border: none; padding: 14px 36px; cursor: pointer; transition: all 0.3s; border-radius: 6px; }
        .quick-view-btn:hover { background: var(--teal-dark); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(26,138,125,0.25); }
        .info-panel::before { content: ''; position: absolute; height: 1px; width: 50%; left: 0;
            background: repeating-linear-gradient(to right, var(--teal-light) 0px, var(--teal-light) 6px, transparent 6px, transparent 14px); opacity: 0.2; bottom: 60px; }

        .scrollbar-container { position: fixed; bottom: 0; left: 0; right: 0; height: 52px; background: var(--bg-white); border-top: 1px solid rgba(26,138,125,0.1); z-index: 1000; display: flex; align-items: center; padding: 0 24px; gap: 16px; }
        .scrollbar-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-light); flex-shrink: 0; min-width: 48px; text-align: center; }
        .scrollbar-track { flex: 1; height: 6px; background: var(--teal-pale); border-radius: 3px; position: relative; cursor: pointer; }
        .scrollbar-thumb { position: absolute; top: -5px; height: 16px; width: 60px; background: var(--teal); border-radius: 8px; cursor: grab; transition: background 0.2s, box-shadow 0.2s; left: 0; }
        .scrollbar-thumb:hover { background: var(--teal-dark); box-shadow: 0 2px 12px rgba(26,138,125,0.3); }
        .scrollbar-thumb.dragging { cursor: grabbing; background: var(--teal-dark); box-shadow: 0 2px 16px rgba(26,138,125,0.4); }
        .scrollbar-fill { position: absolute; top: 0; left: 0; height: 100%; background: linear-gradient(90deg, var(--teal), var(--teal-light)); border-radius: 3px; pointer-events: none; }
        .scrollbar-counter { font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px; color: var(--text-light); flex-shrink: 0; min-width: 55px; text-align: center; }

        .shop-badge { position: fixed; bottom: 64px; left: 24px; width: 64px; height: 64px; z-index: 100; cursor: pointer; }
        .shop-badge svg { width: 100%; height: 100%; animation: rotateBadge 14s linear infinite; }
        @keyframes rotateBadge { to { transform: rotate(360deg); } }

        .loading-overlay { position: fixed; inset: 0; background: var(--bg-white); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s, visibility 0.8s; }
        .loading-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .loading-icon { font-size: 48px; margin-bottom: 20px; animation: loadBounce 1s ease-in-out infinite; }
        @keyframes loadBounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .loading-text { font-family: var(--font-display); font-size: 22px; letter-spacing: 1px; color: var(--text-dark); margin-bottom: 24px; }
        .loading-bar { width: 180px; height: 3px; background: var(--teal-pale); border-radius: 2px; overflow: hidden; }
        .loading-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--teal), var(--teal-light)); transition: width 0.3s; border-radius: 2px; }

        /* ========== DEBUG PANEL — on info side, not blocking 3D ========== */
        .debug-panel {
            position: absolute; top: 12px; right: 12px; z-index: 50;
            background: rgba(30,42,42,0.94); backdrop-filter: blur(8px);
            border-radius: 10px; padding: 14px 16px; width: 280px;
            font-family: var(--font-mono); font-size: 10px; color: #fff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        }
        .debug-panel .debug-title {
            font-size: 11px; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; color: var(--teal-light);
            margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
        }
        .debug-toggle {
            background: rgba(255,255,255,0.15); border: none; color: #fff;
            font-family: var(--font-mono); font-size: 10px; padding: 3px 8px;
            border-radius: 4px; cursor: pointer; letter-spacing: 1px;
        }
        .debug-toggle:hover { background: rgba(255,255,255,0.25); }
        .debug-body { overflow: hidden; transition: max-height 0.3s, opacity 0.3s; max-height: 400px; opacity: 1; }
        .debug-body.collapsed { max-height: 0; opacity: 0; }
        .debug-panel .debug-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
        .debug-panel label { min-width: 52px; color: #8fa3a0; font-size: 9px; }
        .debug-panel input[type="range"] { flex: 1; height: 3px; accent-color: var(--teal-light); cursor: pointer; }
        .debug-panel .debug-val { min-width: 44px; text-align: right; color: var(--teal-light); font-weight: 700; font-size: 9px; }
        .debug-panel .debug-output {
            margin-top: 8px; padding: 6px 8px; background: rgba(0,0,0,0.3);
            border-radius: 6px; font-size: 8px; color: #ccc;
            word-break: break-all; user-select: all; cursor: text;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .debug-panel .debug-output strong { color: var(--teal-light); }

        @media (max-width: 768px) { .product-section { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; } .info-panel { padding: 30px 40px; } .hero-title { font-size: 56px; } }
    </style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-icon">🐾</div>
    <div class="loading-text">Loading Collection...</div>
    <div class="loading-bar"><div class="loading-bar-fill" id="loadingBarFill"></div></div>
</div>
<div class="pattern-bg"></div>
<div class="pattern-dots"></div>
<div class="scroll-container" id="scrollContainer">
    <div class="scroll-track" id="scrollTrack">
        <section class="hero-section">
            <div class="hero-paw p1">🐾</div>
            <div class="hero-paw p2">🐾</div>
            <div class="hero-paw p3">🐾</div>
            <div class="hero-meta">
                <span>3D Pet Accessories</span>
                <span>Interactive Showcase</span>
                <span>Spin · Explore · Shop</span>
            </div>
            <div class="hero-eyebrow">Premium Pet Accessories</div>
            <h1 class="hero-title">Spoil Your<br><em>Best Friend</em></h1>
            <div class="hero-subtitle">Browse our curated collection of pet accessories in full 3D. Rotate each item to see every detail before you buy.</div>
        </section>
    </div>
</div>
<div class="scrollbar-container" id="scrollbarContainer">
    <div class="scrollbar-label" id="scrollLabel">HERO</div>
    <div class="scrollbar-track" id="scrollbarTrack">
        <div class="scrollbar-fill" id="scrollbarFill"></div>
        <div class="scrollbar-thumb" id="scrollbarThumb"></div>
    </div>
    <div class="scrollbar-counter" id="scrollCounter">00 / 09</div>
</div>
<div class="shop-badge">
    <svg viewBox="0 0 100 100">
        <defs><path id="circlePath" d="M 50,50 m -37,0 a 37,37 0 1,1 74,0 a 37,37 0 1,1 -74,0"/></defs>
        <circle cx="50" cy="50" r="6" fill="#1a8a7d"/>
        <text font-size="9" font-family="Space Mono, monospace" fill="#1a8a7d" letter-spacing="2.5">
            <textPath href="#circlePath">VIEW IN 3D · VIEW IN 3D · </textPath>
        </text>
    </svg>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// Models needing debug: model2=idx1, model5=idx4, model8=idx7
var DEBUG_INDICES = [1, 4, 7];

var products = [
    { name: "Cozy Harness", desc: "Soft padded harness with breathable mesh lining. Adjustable straps for a perfect fit.", price: "$34.00", glb: "models/model1.glb" },
    { name: "Travel Carrier", desc: "Airline-approved carrier with ventilated sides and a plush sherpa pad inside.", price: "$72.00", glb: "models/model2.glb" },
    { name: "Adventure Leash", desc: "Tangle-free retractable leash with reflective stitching for evening walks.", price: "$28.00", glb: "models/model3.glb" },
    { name: "Snuggle Bed", desc: "Memory foam pet bed with a removable, machine-washable cover.", price: "$59.00", glb: "models/model4.glb" },
    { name: "Play Ball Set", desc: "Set of 3 durable rubber balls — squeaky, bouncy, and treat-dispensing.", price: "$16.00", glb: "models/model5.glb" },
    { name: "Feeding Bowl", desc: "Elevated stainless steel bowl with a non-slip bamboo stand.", price: "$24.00", glb: "models/model6.glb" },
    { name: "Rain Jacket", desc: "Waterproof coat with a fleece-lined interior and adjustable velcro closures.", price: "$42.00", glb: "models/model7.glb" },
    { name: "Grooming Kit", desc: "Complete kit with slicker brush, nail clippers, and deshedding comb.", price: "$38.00", glb: "models/model8.glb" },
    { name: "GPS Collar", desc: "Smart collar with real-time location tracking, LED light, and activity monitor.", price: "$89.00", glb: "models/model9.glb" },
];

var scrollTrack = document.getElementById('scrollTrack');
var sceneData = [];

products.forEach(function(product, index) {
    var section = document.createElement('section');
    section.className = 'product-section';
    section.id = 'section' + index;

    var modelPanel = document.createElement('div');
    modelPanel.className = 'model-panel';
    modelPanel.id = 'modelPanel' + index;

    var infoPanel = document.createElement('div');
    infoPanel.className = 'info-panel';
    infoPanel.id = 'infoPanel' + index;
    infoPanel.innerHTML = '<div class="product-tag">ITEM #' + String(index + 1).padStart(2, '0') + '</div>' +
        '<h2 class="product-name">' + product.name + '</h2>' +
        '<p class="product-desc">' + product.desc + '</p>' +
        '<p class="product-price">' + product.price + '</p>' +
        '<button class="quick-view-btn">ADD TO CART</button>';

    section.appendChild(modelPanel);
    section.appendChild(infoPanel);
    scrollTrack.appendChild(section);
    product.container = modelPanel;
    product.infoContainer = infoPanel;
});

var gltfLoader = new THREE.GLTFLoader();

function fixMaterials(model) {
    model.traverse(function(child) {
        if (child.isMesh && child.material) {
            var mats = Array.isArray(child.material) ? child.material : [child.material];
            for (var i = 0; i < mats.length; i++) {
                var mat = mats[i];
                // Fix depth sorting — ensure opaque parts render correctly
                mat.depthWrite = true;
                mat.depthTest = true;
                mat.side = THREE.DoubleSide;
                // Only force opaque if the material has no intentional texture-based alpha
                // (i.e. don't nuke materials that use baseColorTexture with alpha)
                if (!mat.alphaMap && !mat.map) {
                    mat.transparent = false;
                    mat.opacity = 1.0;
                }
                mat.needsUpdate = true;
            }
        }
    });
}

// Debug panel — placed on the INFO side so it doesn't block the 3D view
function createDebugPanel(infoContainer, index, camera, controls) {
    var panel = document.createElement('div');
    panel.className = 'debug-panel';

    var rows = [
        { label: 'Cam X', prop: 'camX', min: -250, max: 250 },
        { label: 'Cam Y', prop: 'camY', min: -250, max: 250 },
        { label: 'Cam Z', prop: 'camZ', min: -250, max: 250 },
        { label: 'Target X', prop: 'tgtX', min: -250, max: 250 },
        { label: 'Target Y', prop: 'tgtY', min: -250, max: 250 },
        { label: 'Target Z', prop: 'tgtZ', min: -250, max: 250 },
        { label: 'Scale', prop: 'scale', min: 0.1, max: 20, step: 0.1 }
    ];

    var html = '<div class="debug-title"><span>DEBUG — Model ' + (index + 1) + '</span><button class="debug-toggle" id="dbgToggle' + index + '">HIDE</button></div>';
    html += '<div class="debug-body" id="dbgBody' + index + '">';
    for (var i = 0; i < rows.length; i++) {
        var r = rows[i];
        var step = r.step || 0.5;
        var defVal = r.prop === 'scale' ? 1 : 0;
        html += '<div class="debug-row"><label>' + r.label + '</label><input type="range" min="' + r.min + '" max="' + r.max + '" step="' + step + '" value="' + defVal + '" data-prop="' + r.prop + '"><span class="debug-val" data-out="' + r.prop + '">' + defVal + '</span></div>';
    }
    html += '<div class="debug-output" id="debugOut' + index + '">Adjust sliders...</div>';
    html += '</div>';
    panel.innerHTML = html;
    infoContainer.appendChild(panel);

    // Toggle collapse
    var toggleBtn = panel.querySelector('#dbgToggle' + index);
    var body = panel.querySelector('#dbgBody' + index);
    toggleBtn.addEventListener('click', function() {
        body.classList.toggle('collapsed');
        toggleBtn.textContent = body.classList.contains('collapsed') ? 'SHOW' : 'HIDE';
    });

    // Stop events from scrolling the page
    panel.addEventListener('pointerdown', function(e) { e.stopPropagation(); });
    panel.addEventListener('pointermove', function(e) { e.stopPropagation(); });
    panel.addEventListener('wheel', function(e) { e.stopPropagation(); }, { passive: true });

    var sliders = panel.querySelectorAll('input[type="range"]');
    var outputEl = panel.querySelector('#debugOut' + index);

    function updateFromSliders() {
        var vals = {};
        sliders.forEach(function(s) {
            vals[s.dataset.prop] = parseFloat(s.value);
            panel.querySelector('[data-out="' + s.dataset.prop + '"]').textContent = parseFloat(s.value).toFixed(1);
        });
        camera.position.set(vals.camX, vals.camY, vals.camZ);
        controls.target.set(vals.tgtX, vals.tgtY, vals.tgtZ);
        controls.update();
        // Apply scale to model if loaded
        if (panel._model) {
            panel._model.scale.setScalar(vals.scale);
        }
        outputEl.innerHTML = '<strong>Model ' + (index + 1) + ':</strong> cam(' + vals.camX.toFixed(2) + ', ' + vals.camY.toFixed(2) + ', ' + vals.camZ.toFixed(2) + ') tgt(' + vals.tgtX.toFixed(2) + ', ' + vals.tgtY.toFixed(2) + ', ' + vals.tgtZ.toFixed(2) + ') scale=' + vals.scale.toFixed(2);
    }
    sliders.forEach(function(s) { s.addEventListener('input', updateFromSliders); });

    return {
        panel: panel,
        syncFromCamera: function() {
            panel.querySelector('[data-prop="camX"]').value = camera.position.x;
            panel.querySelector('[data-prop="camY"]').value = camera.position.y;
            panel.querySelector('[data-prop="camZ"]').value = camera.position.z;
            panel.querySelector('[data-prop="tgtX"]').value = controls.target.x;
            panel.querySelector('[data-prop="tgtY"]').value = controls.target.y;
            panel.querySelector('[data-prop="tgtZ"]').value = controls.target.z;
            panel.querySelector('[data-out="camX"]').textContent = camera.position.x.toFixed(1);
            panel.querySelector('[data-out="camY"]').textContent = camera.position.y.toFixed(1);
            panel.querySelector('[data-out="camZ"]').textContent = camera.position.z.toFixed(1);
            panel.querySelector('[data-out="tgtX"]').textContent = controls.target.x.toFixed(1);
            panel.querySelector('[data-out="tgtY"]').textContent = controls.target.y.toFixed(1);
            panel.querySelector('[data-out="tgtZ"]').textContent = controls.target.z.toFixed(1);
            var scaleVal = panel._model ? panel._model.scale.x : 1;
            panel.querySelector('[data-prop="scale"]').value = scaleVal;
            panel.querySelector('[data-out="scale"]').textContent = scaleVal.toFixed(1);
            var d = camera.position.distanceTo(controls.target);
            outputEl.innerHTML = '<strong>Model ' + (index + 1) + ':</strong> cam(' + camera.position.x.toFixed(2) + ', ' + camera.position.y.toFixed(2) + ', ' + camera.position.z.toFixed(2) + ') tgt(' + controls.target.x.toFixed(2) + ', ' + controls.target.y.toFixed(2) + ', ' + controls.target.z.toFixed(2) + ') scale=' + scaleVal.toFixed(2) + ' dist=' + d.toFixed(2);
        },
        setModel: function(m) { panel._model = m; }
    };
}

function initScene(container, infoContainer, glbPath, index) {
    var w = container.clientWidth || window.innerWidth / 2;
    var h = container.clientHeight || window.innerHeight - 52;
    var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(w, h);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.3;
    renderer.physicallyCorrectLights = true;
    renderer.setClearColor(0x000000, 0);
    container.appendChild(renderer.domElement);

    var scene = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(40, w / h, 0.01, 100);
    camera.position.set(3, 2, 3);

    var controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.enablePan = false;
    controls.enableZoom = false;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 2.0;

    var isInteracting = false, autoRotateTimeout;
    renderer.domElement.addEventListener('pointerdown', function(e) { isInteracting = true; controls.autoRotate = false; clearTimeout(autoRotateTimeout); e.stopPropagation(); });
    renderer.domElement.addEventListener('pointermove', function(e) { if (isInteracting) e.stopPropagation(); });
    renderer.domElement.addEventListener('pointerup', function() { isInteracting = false; autoRotateTimeout = setTimeout(function() { controls.autoRotate = true; }, 2500); });
    renderer.domElement.addEventListener('wheel', function(e) { e.stopPropagation(); }, { passive: true });

    scene.add(new THREE.AmbientLight(0xffffff, 0.65));
    scene.add(new THREE.HemisphereLight(0xfff8f0, 0xe0f5f2, 0.5));
    var keyLight = new THREE.DirectionalLight(0xfff5ee, 1.5); keyLight.position.set(4, 8, 6); scene.add(keyLight);
    var fillLight = new THREE.DirectionalLight(0xe0f5f2, 0.5); fillLight.position.set(-5, 3, -3); scene.add(fillLight);
    var rimLight = new THREE.PointLight(0x2ec4b6, 0.4, 20); rimLight.position.set(-3, 2, -4); scene.add(rimLight);
    var warmRim = new THREE.PointLight(0xf4845f, 0.3, 15); warmRim.position.set(4, 1, -3); scene.add(warmRim);
    var pmrem = new THREE.PMREMGenerator(renderer); pmrem.compileEquirectangularShader();
    var envScene = new THREE.Scene(); envScene.background = new THREE.Color(0xf0ede8);
    scene.environment = pmrem.fromScene(envScene, 0.04).texture;

    // Debug panel on info side for specific models
    var debugCtrl = null;
    if (DEBUG_INDICES.indexOf(index) !== -1) {
        controls.autoRotate = false;
        debugCtrl = createDebugPanel(infoContainer, index, camera, controls);
    }

    loadGLB(scene, camera, controls, glbPath, index, debugCtrl);
    sceneData.push({ renderer: renderer, scene: scene, camera: camera, controls: controls, container: container, debugCtrl: debugCtrl });
}

function loadGLB(scene, camera, controls, path, index, debugCtrl) {
    console.log('[Item ' + index + '] Loading: ' + path);
    gltfLoader.load(path, function(gltf) {
        console.log('[Item ' + index + '] Loaded');
        var model = gltf.scene;
        fixMaterials(model);
        scene.add(model);
        var box = new THREE.Box3().setFromObject(model);
        var center = box.getCenter(new THREE.Vector3());
        var size = box.getSize(new THREE.Vector3());
        var maxDim = Math.max(size.x, size.y, size.z);
        
        // Models 2, 5, 8 (indices 1, 4, 7) have offset origins in Blender
        // Need to: scale first, then recalculate center and reposition
        if (DEBUG_INDICES.indexOf(index) !== -1) {
            // Step 1: Scale to normalize size (Babylon.js style)
            var normalizeScale = 2.0 / maxDim;
            model.scale.setScalar(normalizeScale);
            model.position.set(0, 0, 0);
            model.updateMatrixWorld(true);
            
            // Step 2: Recalculate bounds AFTER scaling
            var scaledBox = new THREE.Box3().setFromObject(model);
            var scaledCenter = scaledBox.getCenter(new THREE.Vector3());
            var scaledSize = scaledBox.getSize(new THREE.Vector3());
            
            // Step 3: Move model so its center sits at origin (fixes Blender offset)
            model.position.set(
                -scaledCenter.x,
                -scaledCenter.y,
                -scaledCenter.z
            );
            
            // Camera: close, looking at origin
            camera.position.set(0, 2.5, 4);
            controls.target.set(0, 0, 0);
            controls.minDistance = 0.5;
            controls.maxDistance = 30;
        } else {
            // Normal models: original framing logic
            model.position.sub(center);
            var fov = camera.fov * (Math.PI / 180);
            var dist = (maxDim / 2) / Math.tan(fov / 2) * 1.4;
            camera.position.set(dist * 0.7, dist * 0.5, dist * 0.7);
            controls.target.set(0, 0, 0);
            controls.minDistance = dist * 0.3;
            controls.maxDistance = dist * 4;
        }
        controls.update();
        if (debugCtrl) {
            debugCtrl.setModel(model);
            debugCtrl.syncFromCamera();
        }
        updateLoadProgress();
    }, null, function(err) {
        console.error('[Item ' + index + '] Error', err.message || err);
        createPlaceholder(scene, camera, controls, index);
        updateLoadProgress();
    });
}

function createPlaceholder(scene, camera, controls, index) {
    var geos = [new THREE.SphereGeometry(1,32,32), new THREE.BoxGeometry(1.2,1.2,1.2), new THREE.TorusGeometry(0.8,0.35,16,48), new THREE.IcosahedronGeometry(1,1), new THREE.CylinderGeometry(0.6,0.8,1.5,32), new THREE.TorusKnotGeometry(0.5,0.2,64,16), new THREE.SphereGeometry(0.9,32,32), new THREE.ConeGeometry(0.7,1.5,32), new THREE.OctahedronGeometry(1,0)];
    var cols = [0x1a8a7d,0x2ec4b6,0xf4845f,0x1a8a7d,0x2ec4b6,0xe8b34a,0x1a8a7d,0xf4845f,0x2ec4b6];
    var mesh = new THREE.Mesh(geos[index%geos.length], new THREE.MeshStandardMaterial({color:cols[index%cols.length],metalness:0.1,roughness:0.6}));
    scene.add(mesh); camera.position.set(3,2,3); controls.target.set(0,0,0); controls.update();
}

var loadedCount = 0;
function updateLoadProgress() {
    loadedCount++;
    document.getElementById('loadingBarFill').style.width = (loadedCount / products.length * 100) + '%';
    if (loadedCount >= products.length) setTimeout(function() { document.getElementById('loadingOverlay').classList.add('hidden'); }, 500);
}

var idx = 0;
function initNext() {
    if (idx < products.length) {
        initScene(products[idx].container, products[idx].infoContainer, products[idx].glb, idx);
        idx++;
        setTimeout(initNext, 150);
    }
}
setTimeout(initNext, 300);

function renderAll() {
    requestAnimationFrame(renderAll);
    for (var i = 0; i < sceneData.length; i++) {
        var d = sceneData[i]; if (!d) continue;
        d.controls.update();
        var rect = d.container.getBoundingClientRect();
        if (rect.right > -200 && rect.left < window.innerWidth + 200) d.renderer.render(d.scene, d.camera);
    }
}
renderAll();

var scrollX = 0, targetScrollX = 0, scrollSpeed = 1.5;
function getMaxScroll() { return scrollTrack.scrollWidth - window.innerWidth; }
window.addEventListener('wheel', function(e) { e.preventDefault(); targetScrollX += e.deltaY * scrollSpeed; targetScrollX = Math.max(0, Math.min(targetScrollX, getMaxScroll())); }, { passive: false });
var touchStartX = 0, touchStartScroll = 0;
window.addEventListener('touchstart', function(e) { touchStartX = e.touches[0].clientX; touchStartScroll = targetScrollX; });
window.addEventListener('touchmove', function(e) { targetScrollX = Math.max(0, Math.min(touchStartScroll + (touchStartX - e.touches[0].clientX) * 2, getMaxScroll())); });
window.addEventListener('keydown', function(e) { if (e.key === 'ArrowRight') targetScrollX = Math.min(targetScrollX + 400, getMaxScroll()); if (e.key === 'ArrowLeft') targetScrollX = Math.max(targetScrollX - 400, 0); });

var scrollbarTrack = document.getElementById('scrollbarTrack');
var scrollbarThumb = document.getElementById('scrollbarThumb');
var scrollbarFill = document.getElementById('scrollbarFill');
var scrollLabel = document.getElementById('scrollLabel');
var scrollCounter = document.getElementById('scrollCounter');
var isDragging = false;
scrollbarThumb.addEventListener('pointerdown', function(e) { isDragging = true; scrollbarThumb.classList.add('dragging'); scrollbarThumb.setPointerCapture(e.pointerId); e.preventDefault(); });
window.addEventListener('pointermove', function(e) {
    if (!isDragging) return;
    var trackRect = scrollbarTrack.getBoundingClientRect();
    var thumbW = scrollbarThumb.clientWidth;
    var relX = e.clientX - trackRect.left - thumbW / 2;
    var maxX = trackRect.width - thumbW;
    targetScrollX = Math.max(0, Math.min(1, relX / maxX)) * getMaxScroll();
});
window.addEventListener('pointerup', function() { if (isDragging) { isDragging = false; scrollbarThumb.classList.remove('dragging'); } });
scrollbarTrack.addEventListener('click', function(e) {
    if (e.target === scrollbarThumb) return;
    var trackRect = scrollbarTrack.getBoundingClientRect();
    var thumbW = scrollbarThumb.clientWidth;
    var relX = e.clientX - trackRect.left - thumbW / 2;
    var maxX = trackRect.width - thumbW;
    targetScrollX = Math.max(0, Math.min(1, relX / maxX)) * getMaxScroll();
});

function animateScroll() {
    scrollX += (targetScrollX - scrollX) * 0.08;
    scrollTrack.style.transform = 'translateX(' + (-scrollX) + 'px)';
    var max = getMaxScroll();
    var pct = max > 0 ? scrollX / max : 0;
    var trackW = scrollbarTrack.clientWidth;
    var thumbW = scrollbarThumb.clientWidth;
    scrollbarThumb.style.left = (pct * (trackW - thumbW)) + 'px';
    scrollbarFill.style.width = (pct * 100) + '%';
    var sectionIdx = Math.min(Math.floor(scrollX / window.innerWidth), products.length);
    if (sectionIdx <= 0) { scrollLabel.textContent = 'HERO'; scrollCounter.textContent = '00 / ' + String(products.length).padStart(2, '0'); }
    else { scrollLabel.textContent = '#' + String(sectionIdx).padStart(2, '0'); scrollCounter.textContent = String(sectionIdx).padStart(2, '0') + ' / ' + String(products.length).padStart(2, '0'); }
    requestAnimationFrame(animateScroll);
}
animateScroll();

window.addEventListener('resize', function() {
    for (var i = 0; i < sceneData.length; i++) {
        var d = sceneData[i]; if (!d) continue;
        var w = d.container.clientWidth, h = d.container.clientHeight;
        d.renderer.setSize(w, h); d.camera.aspect = w / h; d.camera.updateProjectionMatrix();
    }
});
</script>
</body>
</html>
